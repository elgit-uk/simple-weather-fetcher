<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Weather Fetcher</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="app-body">
      <header>
        <form id="weather-search">
          <input
            type="text"
            id="search-input"
            placeholder="Enter city name..."
            required
          />
          <button type="submit" id="search-button">Search</button>
        </form>
      </header>
      <main>
        <div class="section-one">
          City name
          <br />
          weather description, Emoji
          <br />
          Humidity (--%), Wind speed (--)km/h
        </div>
        <div class="section-two">
          Current day of the week and time (format 24hrs)
        </div>
      </main>
      <footer>
        This project was coded by
        <a href="https://github.com/elgit-uk" target="_blank">Ellie</a>
        available on
        <a
          href="https://github.com/elgit-uk/simple-weather-fetcher"
          target="_blank"
          >GitHub</a
        >
        and hosted on
        <a
          href="https://app.netlify.com/projects/simple-weather-fetcher/overview"
          target="_blank"
          >Netlify</a
        >
      </footer>
    </div>
  </body>
</html>
