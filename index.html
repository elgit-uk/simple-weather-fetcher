<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://googleapis.com" />
    <link rel="preconnect" href="https://gstatic.com" crossorigin />
    <link
      href="https://googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>Simple Weather Fetcher</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="app-body">
      <header>
        <form id="search-city">
          <input
            type="text"
            id="search-input"
            placeholder="Enter city name..."
            required
          />
          <button type="submit" id="search-button">Search</button>
        </form>
      </header>
      <main>
        <section class="weather-info-container">
          <div class="weather-info">
            <div id="current-location"></div>
            <span id="icon">
              <img
                src="http://shecodes-assets.s3.amazonaws.com/api/weather/icons/broken-clouds-day.png"
                alt="Weather Description Icon"
                id="weather-description-icon"
              />
            </span>
            <span id="current-temperature"> </span>
            <sup class="temperature-unit"> °C </sup>
          </div>
          <ul class="weather-other-info">
            <li class="day-time">
              <span id="current-time"></span>
            </li>
            <li class="description">
              <span id="weather-description"></span>
            </li>
            <li class="humidity">
              Humidity: <span id="current-humidity"></span>%
            </li>
            <li class="wind-speed">
              Wind speed: <span id="current-wind-speed"> </span> km/h
            </li>
          </ul>
        </section>
        <section class="weather-forecast" id="forecast"></section>
      </main>
      <footer>
        This project was coded by
        <a href="https://github.com/elgit-uk" target="_blank">Ellie</a>
        available on
        <a
          href="https://github.com/elgit-uk/simple-weather-fetcher"
          target="_blank"
          >GitHub</a
        >
        and hosted on
        <a
          href="https://app.netlify.com/projects/simple-weather-fetcher/overview"
          >Netlify</a
        >
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
