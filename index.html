<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://googleapis.com" />
    <link rel="preconnect" href="https://gstatic.com" crossorigin />
    <link
      href="https://googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <title>Simple Weather Fetcher</title>
    <link rel="stylesheet" href="src/styles.css" />
  </head>
  <body>
    <div class="app-body">
      <header>
        <form class="search-city">
          <input
            type="text"
            id="search-input"
            placeholder="Enter city name..."
            required
          />
          <button type="submit" id="search-button">Search</button>
        </form>
      </header>
      <main>
        <section class="weather-info-container">
          <div class="weather-info">
            <div class="current-location">London</div>
            <span class="current-temp"> 23 °C </span>
            <span class="weather-description-emoji">🌥️</span>
          </div>
          <div class="weather-other-info">
            <span class="weather-description">Mostly Cloudy</span>
            <div class="current-location-humidity">Humidity: 57%</div>
            <span class="current-location-wind-speed">Wind: 10km/h</span>
          </div>
        </section>
      </main>
      <footer>
        This project was coded by
        <a href="https://github.com/elgit-uk" target="_blank">Ellie</a>
        available on
        <a
          href="https://github.com/elgit-uk/simple-weather-fetcher"
          target="_blank"
          >GitHub</a
        >
        and hosted on
        <a
          href="https://app.netlify.com/projects/simple-weather-fetcher/overview"
          target="_blank"
          >Netlify</a
        >
      </footer>
    </div>
  </body>
</html>
